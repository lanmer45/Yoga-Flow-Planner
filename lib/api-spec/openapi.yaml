openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: poses
    description: Pose bank operations
  - name: routines
    description: Routine operations
  - name: tags
    description: Tag operations
  - name: sessions
    description: Practice session history operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /poses:
    get:
      operationId: listPoses
      tags: [poses]
      summary: List all poses in the pose bank
      responses:
        "200":
          description: List of poses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pose"
    post:
      operationId: createPose
      tags: [poses]
      summary: Add a custom pose to the pose bank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pose"
  /poses/{id}:
    put:
      operationId: updatePose
      tags: [poses]
      summary: Update an existing pose in the pose bank
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoseInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pose"
        "404":
          description: Pose not found
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /tag-labels:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all routine tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagLabel"
    post:
      operationId: createTag
      tags: [tags]
      summary: Add a custom tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagLabelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagLabel"
  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List all routines with summary info
      responses:
        "200":
          description: List of routine summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutineSummary"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
  /routines/{id}:
    get:
      operationId: getRoutine
      tags: [routines]
      summary: Get a routine with its full sections
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routine detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: updateRoutine
      tags: [routines]
      summary: Update a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /routines/{id}/duplicate:
    post:
      operationId: duplicateRoutine
      tags: [routines]
      summary: Duplicate a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List completed practice sessions, most recent first
      responses:
        "200":
          description: List of completed sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Record a completed practice session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorMessage:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Pose:
      type: object
      required:
        [
          id,
          name,
          category,
          defaultDurationSeconds,
          durationType,
          defaultBreaths,
          perSide,
          cue,
          cautions,
          modification,
          chairOption,
          isCustom,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum:
            [
              Centering,
              Warm-Up,
              Standing,
              Backbend,
              Twist,
              Hip,
              Floor,
              Rest,
              Closing,
            ]
        defaultDurationSeconds:
          type: integer
        durationType:
          type: string
          enum: [time, breaths]
        defaultBreaths:
          type: ["integer", "null"]
        perSide:
          type: boolean
        cue:
          type: string
        cautions:
          type: array
          items:
            type: string
            enum: [Back, Knees, Wrists, Neck, Shoulders, Hips, Balance]
        modification:
          type: string
        chairOption:
          type: string
        imageUrl:
          type: ["string", "null"]
        isCustom:
          type: boolean
    PoseInput:
      type: object
      required:
        [
          name,
          category,
          defaultDurationSeconds,
          durationType,
          perSide,
          cue,
          cautions,
          modification,
          chairOption,
        ]
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum:
            [
              Centering,
              Warm-Up,
              Standing,
              Backbend,
              Twist,
              Hip,
              Floor,
              Rest,
              Closing,
            ]
        defaultDurationSeconds:
          type: integer
          minimum: 5
        durationType:
          type: string
          enum: [time, breaths]
        defaultBreaths:
          type: ["integer", "null"]
        perSide:
          type: boolean
        cue:
          type: string
        cautions:
          type: array
          items:
            type: string
            enum: [Back, Knees, Wrists, Neck, Shoulders, Hips, Balance]
        modification:
          type: string
        chairOption:
          type: string
        imageUrl:
          type: ["string", "null"]
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    TagLabel:
      type: object
      required: [id, name, isCustom]
      properties:
        id:
          type: integer
        name:
          type: string
        isCustom:
          type: boolean
    TagLabelInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
    RoutineEntry:
      type: object
      required: [poseId, durationSeconds, breaths]
      properties:
        poseId:
          type: integer
        durationSeconds:
          type: integer
        breaths:
          type: ["integer", "null"]
    RoutineSections:
      type: object
      required: [centering, flow, closing]
      properties:
        centering:
          type: array
          items:
            $ref: "#/components/schemas/RoutineEntry"
        flow:
          type: array
          items:
            $ref: "#/components/schemas/RoutineEntry"
        closing:
          type: array
          items:
            $ref: "#/components/schemas/RoutineEntry"
    Routine:
      type: object
      required: [id, title, description, tags, sections, totalSeconds]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        sections:
          $ref: "#/components/schemas/RoutineSections"
        totalSeconds:
          type: integer
    RoutineInput:
      type: object
      required: [title, sections]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        sections:
          $ref: "#/components/schemas/RoutineSections"
    Session:
      type: object
      required: [id, routineId, routineTitle, totalSeconds, completedAt]
      properties:
        id:
          type: integer
        routineId:
          type: ["integer", "null"]
        routineTitle:
          type: string
        totalSeconds:
          type: integer
        completedAt:
          type: string
          format: date-time
    SessionInput:
      type: object
      required: [routineTitle, totalSeconds]
      properties:
        routineId:
          type: ["integer", "null"]
        routineTitle:
          type: string
          minLength: 1
        totalSeconds:
          type: integer
          minimum: 0
    RoutineSummary:
      type: object
      required: [id, title, description, tags, totalSeconds, poseCount, cautions]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        totalSeconds:
          type: integer
        poseCount:
          type: integer
        cautions:
          type: array
          items:
            type: string
